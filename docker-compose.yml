version: '3.8'

networks:
  app-network:
    driver: bridge

services:
  # ---------------- DATABASES ----------------

  sqlserver-article:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: article-sqlserver
    environment:
      SA_PASSWORD: "YourStrong!Passw0rd"
      ACCEPT_EULA: "Y"
    ports:
      - "1433:1433"
    volumes:
      - sqlvolume_article:/var/opt/mssql
    restart: always
    networks:
      - app-network

  sqlserver-comment:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: comment-sqlserver
    environment:
      SA_PASSWORD: "YourStrong!Passw0rd"
      ACCEPT_EULA: "Y"
    ports:
      - "1434:1433"
    volumes:
      - sqlvolume_comment:/var/opt/mssql
    restart: always
    networks:
      - app-network

  sqlserver-profanity:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: profanity-sqlserver
    environment:
      SA_PASSWORD: "YourStrong!Passw0rd"
      ACCEPT_EULA: "Y"
    ports:
      - "1435:1433"
    volumes:
      - sqlvolume_profanity:/var/opt/mssql
    restart: always
    networks:
      - app-network

  sqlserver-draft:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: draft-sqlserver
    environment:
      SA_PASSWORD: "YourStrong!Passw0rd"
      ACCEPT_EULA: "Y"
    ports:
      - "1436:1433"
    volumes:
      - sqlvolume_draft:/var/opt/mssql
    restart: always
    networks:
      - app-network

  # ---------------- DB INIT ----------------

  db-init-article:
    image: mcr.microsoft.com/mssql-tools
    depends_on:
      - sqlserver-article
    volumes:
      - ./ArticleInit.sql:/init.sql
    entrypoint: >
      /bin/bash -c "
      sleep 25 &&
      /opt/mssql-tools/bin/sqlcmd -S sqlserver-article -U sa -P YourStrong!Passw0rd -i /init.sql
      "
    networks:
      - app-network

  db-init-comment:
    image: mcr.microsoft.com/mssql-tools
    depends_on:
      - sqlserver-comment
    volumes:
      - ./comment-init.sql:/init.sql
    entrypoint: >
      /bin/bash -c "
      sleep 25 &&
      /opt/mssql-tools/bin/sqlcmd -S sqlserver-comment -U sa -P YourStrong!Passw0rd -i /init.sql
      "
    networks:
      - app-network

  db-init-profanity:
    image: mcr.microsoft.com/mssql-tools
    depends_on:
      - sqlserver-profanity
    volumes:
      - ./profanity-init.sql:/init.sql
    entrypoint: >
      /bin/bash -c "
      sleep 25 &&
      /opt/mssql-tools/bin/sqlcmd -S sqlserver-profanity -U sa -P YourStrong!Passw0rd -i /init.sql
      "
    networks:
      - app-network

  db-init-draft:
    image: mcr.microsoft.com/mssql-tools
    depends_on:
      - sqlserver-draft
    volumes:
      - ./DraftInit.sql:/init.sql
    entrypoint: >
      /bin/bash -c "
      sleep 25 &&
      /opt/mssql-tools/bin/sqlcmd -S sqlserver-draft -U sa -P YourStrong!Passw0rd -i /init.sql
      "
    networks:
      - app-network

  # ---------------- QUEUE ----------------

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: rabbitmq
    environment:
      - RABBITMQ_DEFAULT_USER=article_user
      - RABBITMQ_DEFAULT_PASS=article_password
    ports:
      - "5672:5672"
      - "15672:15672"
    restart: always
    networks:
      - app-network

  article-queue:
    build:
      context: .
      dockerfile: ArticleQueue/Dockerfile
    image: article-queue:latest
    ports:
      - "5204:80"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - RabbitMq__Host=rabbitmq
      - RabbitMq__Port=5672
      - RabbitMq__Username=article_user
      - RabbitMq__Password=article_password
      - RabbitMq__Exchange=article.events
      - RabbitMq__Queue=article.published
      - RabbitMq__RoutingKey=article.published
    depends_on:
      - rabbitmq
    networks:
      - app-network

  # ---------------- SERVICES ----------------

  article-service:
    build:
      context: .
      dockerfile: ArticleService/Dockerfile
    image: article-service:latest
    ports:
      - "8081:80"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - RabbitMq__Host=rabbitmq
      - RabbitMq__Port=5672
      - RabbitMq__Username=article_user
      - RabbitMq__Password=article_password
      - RabbitMq__Exchange=article.events
      - RabbitMq__Queue=article.published
      - RabbitMq__RoutingKey=article.published
    depends_on:
      - sqlserver-article
      - db-init-article
      - rabbitmq
      - article-queue
    networks:
      - app-network

  article-service-2:
    image: article-service:latest
    ports:
      - "8082:80"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - RabbitMq__Host=rabbitmq
      - RabbitMq__Port=5672
      - RabbitMq__Username=article_user
      - RabbitMq__Password=article_password
      - RabbitMq__Exchange=article.events
      - RabbitMq__Queue=article.published
      - RabbitMq__RoutingKey=article.published
    depends_on:
      - sqlserver-article
      - rabbitmq
      - article-queue
    networks:
      - app-network

  comment-service:
    build:
      context: .
      dockerfile: CommentService/Dockerfile
    image: comment-service:latest
    ports:
      - "8083:80"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ProfanityService__Url=http://profanity-service:80
    depends_on:
      - sqlserver-comment
      - profanity-service
    networks:
      - app-network

  profanity-service:
    build:
      context: .
      dockerfile: ProfanityService/Dockerfile
    image: profanity-service:latest
    ports:
      - "8084:80"
    depends_on:
      - sqlserver-profanity
    networks:
      - app-network

  draft-service:
    build:
      context: .
      dockerfile: DraftService/Dockerfile
    image: draft-service:latest
    ports:
      - "5201:5201"
    depends_on:
      - sqlserver-draft
    networks:
      - app-network
  
  publisher-service:
    build:
      context: .
      dockerfile: PublisherService/Dockerfile
    image: publisher-service:latest
    ports:
      - "5203:80"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - RabbitMq__Host=rabbitmq
      - RabbitMq__Port=5672
      - RabbitMq__Username=article_user
      - RabbitMq__Password=article_password
      - RabbitMq__Exchange=article.events
      - RabbitMq__Queue=article.published
      - RabbitMq__RoutingKey=article.published
    depends_on:
      - rabbitmq
      - article-queue
    networks:
      - app-network
  
  webapp:
    build:
      context: .
      dockerfile: WebApp/Dockerfile
    image: webapp:latest
    ports:
      - "5202:5202"
    depends_on:
      - article-service
      - draft-service
    networks:
      - app-network

  # ---------------- LOAD BALANCER ----------------

  nginx:
    image: nginx:alpine
    container_name: nginx-load-balancer
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - article-service
      - article-service-2
    networks:
      - app-network

  # ---------------- OBSERVABILITY ----------------

  loki:
    image: grafana/loki:2.9.0
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - app-network

  grafana:
    image: grafana/grafana
    ports:
      - "3000:3000"
    networks:
      - app-network

  tempo:
    image: grafana/tempo:2.4.1
    command: ["-config.file=/etc/tempo.yaml"]
    volumes:
      - ./tempo.yaml:/etc/tempo.yaml
    ports:
      - "3200:3200"
      - "4317:4317"
    networks:
      - app-network

volumes:
  sqlvolume_article:
  sqlvolume_comment:
  sqlvolume_profanity:
  sqlvolume_draft: