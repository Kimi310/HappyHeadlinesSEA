version: '3.8'

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: article-sqlserver
    environment:
      SA_PASSWORD: "YourStrong!Passw0rd"
      ACCEPT_EULA: "Y"
    ports:
      - "1433:1433"
    volumes:
      - sqlvolume-article:/var/opt/mssql
    restart: always
  
  sqlserver-comment:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: comment-sqlserver
    environment:
      SA_PASSWORD: "YourStrong!Passw0rd"
      ACCEPT_EULA: "Y"
    ports:
      - "1434:1433"
    volumes:
      - sqlvolume-comment:/var/opt/mssql
    restart: always
  
  sqlserver-profanity:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: profanity-sqlserver
    environment:
      SA_PASSWORD: "YourStrong!Passw0rd"
      ACCEPT_EULA: "Y"
    ports:
      - "1435:1433"
    volumes:
      - sqlvolume-profanity:/var/opt/mssql
    restart: always

  db-init:
    image: mcr.microsoft.com/mssql-tools
    depends_on:
      - sqlserver
    volumes:
      - ./init.sql:/init.sql
    entrypoint: >
      /bin/bash -c "
      sleep 25 &&
      /opt/mssql-tools/bin/sqlcmd -S sqlserver -U sa -P YourStrong!Passw0rd -i /init.sql
      "

  db-comment-init:
    image: mcr.microsoft.com/mssql-tools
    depends_on:
      - sqlserver-comment
    volumes:
      - ./comment-init.sql:/init.sql
    entrypoint: >
      /bin/bash -c "
      sleep 25 &&
      /opt/mssql-tools/bin/sqlcmd -S sqlserver-comment -U sa -P YourStrong!Passw0rd -i /init.sql
      "

  db-profanity-init:
    image: mcr.microsoft.com/mssql-tools
    depends_on:
      - sqlserver-profanity
    volumes:
      - ./profanity-init.sql:/init.sql
    entrypoint: >
      /bin/bash -c "
      sleep 25 &&
      /opt/mssql-tools/bin/sqlcmd -S sqlserver-profanity -U sa -P YourStrong!Passw0rd -i /init.sql
      "

  nginx:
    image: nginx:alpine
    container_name: nginx-load-balancer
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - article-service
      - article-service-2
    restart: always

  article-service:
    build:
      context: .
      dockerfile: ArticleService/Dockerfile
    container_name: article-service
    image: article-service:latest
    ports:
      - "8081:80"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
    depends_on:
      - sqlserver
      - db-init
    restart: always

  article-service-2:
    build:
      context: .
      dockerfile: ArticleService/Dockerfile
    container_name: article-service-2
    image: article-service:latest
    ports:
      - "8082:80"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
    depends_on:
      - sqlserver
      - db-init
    restart: always

  comment-service:
    build:
      context: .
      dockerfile: CommentService/Dockerfile
    container_name: comment-service
    image: comment-service:latest
    ports:
      - "8083:80"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
    depends_on:
      - sqlserver-comment
      - db-comment-init
      - profanity-service
    restart: always

  profanity-service:
    build:
      context: .
      dockerfile: ProfanityService/Dockerfile
    container_name: profanity-service
    image: profanity-service:latest
    ports:
      - "8084:80"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
    depends_on:
      - sqlserver-profanity
      - db-profanity-init
    restart: always

volumes:
  sqlvolume-article:
  sqlvolume-comment:
  sqlvolume-profanity: