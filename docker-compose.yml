version: '3.8'

services:
  sqlserver-article:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: article-sqlserver
    environment:
      SA_PASSWORD: "YourStrong!Passw0rd"
      ACCEPT_EULA: "Y"
    ports:
      - "1433:1433"
    volumes:
      - sqlvolume_article:/var/opt/mssql
    restart: always

  sqlserver-draft:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: draft-sqlserver
    environment:
      SA_PASSWORD: "YourStrong!Passw0rd"
      ACCEPT_EULA: "Y"
    ports:
      - "1434:1433"
    volumes:
      - sqlvolume_draft:/var/opt/mssql
    restart: always

  db-init-article:
    image: mcr.microsoft.com/mssql-tools
    depends_on:
      - sqlserver-article
    volumes:
      - ./ArticleInit.sql:/ArticleInit.sql
    entrypoint: >
      /bin/bash -c "
      sleep 25 &&
      /opt/mssql-tools/bin/sqlcmd -S sqlserver-article -U sa -P YourStrong!Passw0rd -i /ArticleInit.sql
      "

  db-init-draft:
    image: mcr.microsoft.com/mssql-tools
    depends_on:
      - sqlserver-draft
    volumes:
      - ./DraftInit.sql:/DraftInit.sql
    entrypoint: >
      /bin/bash -c "
      sleep 25 &&
      /opt/mssql-tools/bin/sqlcmd -S sqlserver-draft -U sa -P YourStrong!Passw0rd -i /DraftInit.sql
      "
  
  api-1-article:
    build:
      context: .
      dockerfile: ArticleService/Dockerfile
    image: happyheaders-api:latest
    ports:
      - "5199:5199"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
    depends_on:
      - sqlserver-article
  
  api-2-article:
    image: happyheaders-api:latest
    ports:
      - "5200:5199"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
    depends_on:
      - sqlserver-article
  
  api-draft:
    build:
      context: .
      dockerfile: DraftService/Dockerfile
    image: happyheaders-draft-api:latest
    ports:
      - "5201:5201"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
    depends_on:
      - sqlserver-draft
    
  loki:
    image: grafana/loki:2.9.0
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml

  grafana:
    image: grafana/grafana
    ports:
      - "3000:3000"

volumes:
  sqlvolume_article:
  sqlvolume_draft: